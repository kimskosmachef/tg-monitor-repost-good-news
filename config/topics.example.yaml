# ОБРАЗЕЦ — не заполнять, копируй в файл без .example
# Пример topics.yaml — §4, §4.2, §5, §11 docs/spec.md.
# Плоский список тем, читается по mtime, правка не требует передеплоя.
# Примеры граней живут в отдельных текстовых файлах (§4.2), не в этом YAML —
# examples_file/negatives_file разрешаются относительно каталога topics.yaml.
# Ниже — заглушки для структуры (config/examples/*.example.txt); перед боевым
# использованием заменить на настоящие посты (минимум 8-10 на грань) в
# соответствующих config/examples/*.txt (реальные файлы в git не попадают).

- id: topic_one
  target: "@target_channel_one"
  sources: all                   # или список id источников из sources.yaml
  threshold: null                 # null = shadow-режим, порог не откалиброван
  soft_threshold: 0.2              # мягкий порог shadow-режима, см. §5.5 (спека v1.7)
  chunk_strategy: paragraph
  facets:
    - id: facet_a
      examples_file: examples/facet_a.example.txt
    - id: facet_b
      examples_file: examples/facet_b.example.txt
  # negatives_file опционален, см. §5.4 — не задан, второго центроида нет

# Первая тема проекта — §11: положительные новости о бизнесе
# русскоговорящих за пределами РФ/СНГ. Признак "русскоговорящий вне СНГ"
# обеспечивается подбором источников (§11.2), не текстом примеров.
- id: diaspora_business_good
  target: "@diaspora_business_good_channel"
  sources: all
  threshold: null                 # начинаем в shadow-режиме, см. §5.5
  soft_threshold: 0.2              # мягкий порог shadow-режима, см. §5.5 (спека v1.7)
  chunk_strategy: paragraph
  facets:
    - id: entrepreneurship
      examples_file: examples/entrepreneurship.example.txt
    - id: career
      examples_file: examples/career.example.txt
    - id: startup_invest
      examples_file: examples/startup_invest.example.txt
    - id: culture_commercial
      examples_file: examples/culture_commercial.example.txt
  # negatives_file опционален, см. §5.4 — добавлять только если ложняки
  # группируются вокруг одного сюжета
