# Пример topics.yaml — §4, §5, §11 docs/spec.md.
# Плоский список тем, читается по mtime, правка не требует передеплоя.
# Примеры граней — РЕАЛЬНЫЕ ПОСТЫ, а не описания темы (§5.1). Ниже — заглушки
# для структуры; перед боевым использованием заменить на настоящие посты
# (минимум 8-10 на грань).

- id: topic_one
  target: "@target_channel_one"
  sources: all                   # или список id источников из sources.yaml
  threshold: null                 # null = shadow-режим, порог не откалиброван
  chunk_strategy: paragraph
  facets:
    - id: facet_a
      examples:
        - "текст реального поста по этой грани"
        - "второй пример поста"
    - id: facet_b
      examples:
        - "текст поста по второй грани"
        - "ещё один пример"
  negatives: []                   # опционально, см. §5.4

# Первая тема проекта — §11: положительные новости о бизнесе
# русскоговорящих за пределами РФ/СНГ. Признак "русскоговорящий вне СНГ"
# обеспечивается подбором источников (§11.2), не текстом примеров.
- id: diaspora_business_good
  target: "@diaspora_business_good_channel"
  sources: all
  threshold: null                 # начинаем в shadow-режиме, см. §5.5
  chunk_strategy: paragraph
  facets:
    - id: entrepreneurship
      examples:
        - "предприниматель из диаспоры открыл второй магазин в новом городе"
        - "русскоговорящая семья запустила пекарню, за полгода вышла на прибыль"
        - "локальный бизнес релоканта вышел на новый рынок сбыта"
    - id: career
      examples:
        - "релокант назначен руководителем отдела в местной компании"
        - "выходец из диаспоры получил повышение до директора направления"
        - "русскоговорящий специалист занял ключевую должность в стартапе"
    - id: startup_invest
      examples:
        - "стартап основателей-релокантов привлёк раунд инвестиций"
        - "команда диаспоры запустила продукт и вышла на первых клиентов"
        - "инвестор из диаспоры закрыл сделку по покупке доли в местной компании"
    - id: culture_commercial
      examples:
        - "культурный проект диаспоры открыл платные мастер-классы и вышел на самоокупаемость"
        - "галерея, основанная релокантами, начала продавать работы художников диаспоры"
        - "русскоязычный театр за рубежом запустил коммерческие показы"
  negatives: []                   # см. §5.4 — добавлять только если ложняки группируются вокруг сюжета
